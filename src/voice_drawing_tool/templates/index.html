<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音绘图工具</title>
<link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>

<header class="top-bar">
  <div class="top-left">
    <span class="logo">🎤</span>
    <h1>语音绘图</h1>
    <span class="badge" id="status-badge">● 就绪</span>
  </div>
  <div class="top-right">
    <span class="stat"><span class="label">指令</span><span id="cmd-count">0</span></span>
    <span class="stat"><span class="label">时长</span><span id="duration">00:00</span></span>
  </div>
</header>

<div class="canvas-full">
  <div class="canvas-wrapper">
    <img id="canvas-img" src="/api/preview" alt="画布">
    <div id="voice-indicator" class="voice-indicator">
      <div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div>
      <span class="voice-label" id="voice-label">等待启动</span>
    </div>
    <div id="feedback-toast" class="toast hidden"></div>
    <div id="welcome-overlay" class="welcome-overlay">
      <div class="welcome-content">
        <h2>🎤 语音绘图工具</h2>
        <p>纯语音交互，说出指令即可绘图</p>
        <button id="start-mic" class="start-mic-btn" onclick="startApp()">🎤 点击启动语音识别</button>
        <div class="welcome-examples">
          <span>画红圆</span><span>画房子</span><span>画太阳在上面</span>
          <span>撤销</span><span>清空</span><span>保存</span>
        </div>
        <p id="debug-log" style="font-size:13px;color:#666;margin-top:16px;"></p>
      </div>
    </div>
  </div>
</div>

<script>
// ── 状态 ──
var audioCtx = null;
var micStream = null;
var processor = null;
var isCapturing = false;
var isSpeaking = false;
var isSending = false;   // Whisper 转写进行中，暂停采集
var silenceFrames = 0;
var speechBuffer = [];     // Float32Array 累积
var SAMPLE_RATE = 16000;
var SILENCE_THRESHOLD = 0.012;  // 静音阈值（降低以提高灵敏度）
var SILENCE_FRAMES = 8;         // 8×93ms ≈ 0.75秒静音后发送
var MIN_SPEECH_FRAMES = 4;      // 最少 ~100ms 语音才发送

function log(msg) {
  var el = document.getElementById('debug-log');
  if (el) el.textContent += msg + ' | ';
  console.log('[Voice]', msg);
}

// ── 启动麦克风 ──
function startApp() {
  log('启动中…');
  document.getElementById('welcome-overlay').classList.add('hidden');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setVoiceLabel('浏览器不支持麦克风 API', true);
    return;
  }

  navigator.mediaDevices.getUserMedia({audio: {sampleRate: SAMPLE_RATE, channelCount: 1}})
    .then(function(stream) {
      micStream = stream;
      // 获取实际采样率
      var tempCtx = new (window.AudioContext || window.webkitAudioContext)();
      var tempSource = tempCtx.createMediaStreamSource(stream);
      SAMPLE_RATE = tempCtx.sampleRate;
      tempCtx.close();
      log('麦克风已打开，采样率: ' + SAMPLE_RATE);
      startCapture();
    })
    .catch(function(err) {
      log('麦克风错误: ' + err.message);
      setVoiceLabel('麦克风权限被拒绝', true);
    });
}

// ── 开始录音 + VAD ──
function startCapture() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: SAMPLE_RATE});
  var source = audioCtx.createMediaStreamSource(micStream);

  // 使用 ScriptProcessorNode 捕获 PCM（4096 帧 ≈ 93ms @44100）
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  source.connect(processor);
  processor.connect(audioCtx.destination);

  isCapturing = true;
  setVoiceLabel('正在聆听…', false);
  setStatusBadge('● 聆听中', '#4caf50');

  processor.onaudioprocess = function(e) {
    if (!isCapturing || isSending) return;
    var data = e.inputBuffer.getChannelData(0);

    // 计算 RMS 音量
    var sum = 0;
    for (var i = 0; i < data.length; i++) sum += data[i] * data[i];
    var rms = Math.sqrt(sum / data.length);

    if (rms > SILENCE_THRESHOLD) {
      // 检测到语音
      if (!isSpeaking) {
        isSpeaking = true;
        speechBuffer = [];
        log('语音开始');
        setVoiceLabel('🎤 检测到语音…', false);
      }
      silenceFrames = 0;
      speechBuffer.push(new Float32Array(data));
    } else if (isSpeaking) {
      silenceFrames++;
      speechBuffer.push(new Float32Array(data)); // 保留静音帧（前后缓冲）

      if (silenceFrames >= SILENCE_FRAMES) {
        // 静音足够长，认为说完
        isSpeaking = false;
        var totalFrames = speechBuffer.length;
        if (totalFrames >= MIN_SPEECH_FRAMES) {
          log('语音结束，发送 ' + totalFrames + ' 帧');
          setVoiceLabel('识别中…', false);
          sendAudioForTranscription();
        } else {
          log('语音太短，忽略');
          speechBuffer = [];
        }
      }
    }
  };
}

// ── 发送音频到后端 Whisper ──
function sendAudioForTranscription() {
  isSending = true;  // 暂停采集，防止并发

  // 合并所有帧
  var totalLen = 0;
  for (var i = 0; i < speechBuffer.length; i++) totalLen += speechBuffer[i].length;
  var pcm = new Float32Array(totalLen);
  var offset = 0;
  for (var i = 0; i < speechBuffer.length; i++) {
    pcm.set(speechBuffer[i], offset);
    offset += speechBuffer[i].length;
  }
  speechBuffer = [];

  // Float32 → Int16 PCM
  var int16 = new Int16Array(pcm.length);
  for (var i = 0; i < pcm.length; i++) {
    var s = Math.max(-1, Math.min(1, pcm[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  fetch('/api/audio?rate=' + SAMPLE_RATE, {
    method: 'POST',
    headers: {'Content-Type': 'application/octet-stream'},
    body: int16.buffer
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.texts && data.texts.length > 0) {
      var text = data.texts[0];
      log('识别结果: ' + text);
      setVoiceLabel('🎤 ' + text, false);

      if (data.result) {
        showToast(data.result.feedback, data.result.ok);
        document.getElementById('canvas-img').src = '/api/preview?t=' + Date.now();
        if (data.result.cmd_count !== undefined) {
          document.getElementById('cmd-count').textContent = data.result.cmd_count;
        }
      } else {
        showToast(data.feedback || '未识别', false);
      }
      // 保持识别结果显示 1.5 秒后恢复聆听状态
      setTimeout(function() {
        setVoiceLabel('正在聆听…', false);
        isSending = false;
      }, 1500);
    } else {
      setVoiceLabel('正在聆听…', false);
      isSending = false;
      if (data.feedback) showToast(data.feedback, false);
    }
  })
  .catch(function(err) {
    log('请求失败: ' + err.message);
    setVoiceLabel('正在聆听…', false);
    isSending = false;
  });
}

// ── UI 工具 ──
function setVoiceLabel(text, isError) {
  var indicator = document.getElementById('voice-indicator');
  var label = document.getElementById('voice-label');
  label.textContent = text;
  if (isError) indicator.classList.add('error');
  else indicator.classList.remove('error');
}

function setStatusBadge(text, color) {
  var badge = document.getElementById('status-badge');
  badge.textContent = text;
  badge.style.color = color || '';
}

var toastTimer;
function showToast(msg, ok) {
  var toast = document.getElementById('feedback-toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (ok ? 'success' : 'error');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.add('hidden'); }, 3500);
}

// 定期刷新画布和状态（JPEG 更快，每 1.5 秒）
setInterval(function() {
  var img = document.getElementById('canvas-img');
  img.src = '/api/preview?t=' + Date.now();
  fetch('/api/state').then(function(r) { return r.json(); }).then(function(s) {
    document.getElementById('cmd-count').textContent = s.cmd_count;
    var mm = String(Math.floor(s.session_duration / 60)).padStart(2, '0');
    var ss = String(s.session_duration % 60).padStart(2, '0');
    document.getElementById('duration').textContent = mm + ':' + ss;
  }).catch(function(){});
}, 1500);
</script>
</body>
</html>
