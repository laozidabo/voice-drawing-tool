<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音绘图工具</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<!-- 顶部状态栏 -->
<header class="top-bar">
  <div class="top-left">
    <span class="logo">🎤</span>
    <h1>语音绘图</h1>
    <span class="badge" id="status-badge">● 连接中…</span>
  </div>
  <div class="top-right">
    <span class="stat"><span class="label">指令</span><span id="cmd-count">0</span></span>
    <span class="stat"><span class="label">时长</span><span id="duration">00:00</span></span>
  </div>
</header>

<!-- 画布区域 -->
<div class="canvas-full">
  <div class="canvas-wrapper">
    <img id="canvas-img" src="/api/preview" alt="画布">
    <!-- 语音状态指示 -->
    <div id="voice-indicator" class="voice-indicator">
      <div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div>
      <span class="voice-label" id="voice-label">正在聆听…</span>
    </div>
    <!-- 反馈提示 -->
    <div id="feedback-toast" class="toast hidden"></div>
    <!-- 欢迎提示（首次打开） -->
    <div id="welcome-overlay" class="welcome-overlay">
      <div class="welcome-content">
        <h2>🎤 语音绘图工具</h2>
        <p>纯语音交互，说出指令即可绘图</p>
        <button id="start-mic" class="start-mic-btn">🎤 点击启动语音识别</button>
        <div class="welcome-examples">
          <span>画红圆</span><span>画房子</span><span>画太阳在上面</span>
          <span>撤销</span><span>清空</span><span>保存</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
